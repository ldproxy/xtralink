when:
  event: push

steps:
  docker_tags:
    image: ghcr.io/dvjn/woodpecker-docker-tags-plugin
    settings:
      tags: |
        edge -v next
        edge -v next-${CI_PIPELINE_CREATED}

  docker-main:
    image: woodpeckerci/plugin-docker-buildx:5.2.0
    settings:
      registry: ghcr.io
      repo: ghcr.io/ldproxy/xtralink
      tags_file: .tags
      force_tag: true
      pull_image: true
      platforms:
        - linux/amd64
        - linux/arm64
      logins:
        - registry: ghcr.io
          username:
            from_secret: ghcr_username
          password:
            from_secret: ghcr_password
    when:
      - branch: main

